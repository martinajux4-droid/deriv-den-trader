<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site unavailable</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      text-align: center;
      padding: 40px 32px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #141414;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #f5f5f5; }
    p { font-size: 0.95rem; line-height: 1.55; color: #b0b0b0; white-space: pre-wrap; }
    .brand { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: #666; margin-top: 28px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">This page is unavailable</h1>
    <p id="message">Please try again later.</p>
    <p class="brand" id="brand"></p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var msg = params.get('msg');
      if (!msg) {
        try { msg = sessionStorage.getItem('killSwitchMessage'); } catch (e) {}
      }
      if (msg) {
        document.getElementById('message').textContent = decodeURIComponent(msg.replace(/\+/g, ' '));
      }
      var brand = params.get('brand');
      if (brand) {
        document.getElementById('brand').textContent = brand;
      }
    })();
  </script>
</body>
</html>
